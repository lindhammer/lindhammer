<svg width="100%" viewBox="0 0 680 180" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Luis Lindhammer — Developer &amp; Designer</title>
  <desc>Banner for Luis Lindhammer's GitHub profile</desc>
  <style>
    .bg { fill: #ccd1d3; }
    .name { fill: #111111; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 64px; font-weight: 500; letter-spacing: -0.045em; }
    .sub { fill: #6b6b66; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
    .accent { fill: none; stroke: #4a7060; }
    .dot { fill: #4a7060; }
  </style>

  <rect class="bg" width="680" height="180"/>
  <line class="accent" x1="40" y1="36" x2="640" y2="36" stroke-width="1"/>
  <text class="name" x="40" y="112">Lindhammer</text>
  <circle class="dot" cx="40" cy="142" r="3"/>
  <text class="sub" x="52" y="146">Developer &amp; Designer</text>
  <text class="sub" x="640" y="146" text-anchor="end">Leipzig / Mittweida</text>
  <line class="accent" x1="40" y1="160" x2="640" y2="160" stroke-width="0.5" stroke-opacity="0.4"/>
</svg>
